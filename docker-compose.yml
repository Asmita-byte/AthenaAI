version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: athena_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: athena_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: athena_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - DATABASE_URL=sqlite+aiosqlite:////app/storage/metadata.db
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: athena_worker
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - DATABASE_URL=sqlite+aiosqlite:////app/storage/metadata.db
    volumes:
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data: