<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athena AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 24'><path d='M2 12 C8 2, 28 2, 34 12 C28 22, 8 22, 2 12Z' stroke='%23c96442' stroke-width='2' fill='none'/><circle cx='18' cy='12' r='5' fill='%23c96442'/><circle cx='20' cy='10' r='1.5' fill='white' opacity='.6'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poetsen+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--sidebar:#161616;--bubble:#2f2f2f;
  --border:#3d3d3d;--text:#ececec;--muted:#8e8ea0;
  --accent:#c96442;--hover:#2a2a2a;--input:#2f2f2f;
  --font:'Inter',ui-sans-serif,system-ui,sans-serif;
  --font-display:'Poetsen One',sans-serif;
  --mono:'Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:15px;line-height:1.65;overflow:hidden}

/* LAYOUT */
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:256px;min-width:256px;background:var(--sidebar);
  border-right:1px solid var(--border);display:flex;
  flex-direction:column;padding:10px 8px;gap:2px;
  overflow-y:auto;transition:transform .25s ease;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sb-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 6px 10px;
}
.sb-logo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:400;color:var(--text);font-family:var(--font-display);letter-spacing:.2px}


/* SVG Eye icon - static */
.eye-svg{width:22px;height:22px;color:var(--accent);flex-shrink:0}

.icon-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:6px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;transition:background .15s,color .15s;
}
.icon-btn:hover{background:var(--hover);color:var(--text)}

/* MODE TOGGLE */
.mode-toggle{
  display:flex;background:#111;border-radius:8px;
  padding:3px;margin:4px 2px 8px;gap:2px;
}
.mode-btn{
  flex:1;background:none;border:none;color:var(--muted);
  font-family:var(--font);font-size:12px;font-weight:500;
  padding:6px 4px;border-radius:6px;cursor:pointer;
  transition:background .15s,color .15s;text-align:center;
}
.mode-btn.active{background:var(--bubble);color:var(--text)}

.sec-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--muted);padding:8px 8px 4px;
}
.divider{height:1px;background:var(--border);margin:6px 0}

/* Upload */
.upload-area{
  border:1px dashed var(--border);border-radius:8px;
  padding:12px;margin:2px;cursor:pointer;
  transition:border-color .15s,background .15s;text-align:center;
}
.upload-area:hover{border-color:var(--accent);background:rgba(201,100,66,.05)}
.upload-area input{display:none}
.upload-icon{font-size:18px;margin-bottom:4px;color:var(--muted)}
.upload-text{font-size:12px;color:var(--muted)}
.upload-hint{font-size:11px;color:var(--muted);opacity:.6;margin-top:2px}

/* Docs */
.doc-item{
  display:flex;align-items:center;gap:7px;padding:6px 8px;
  border-radius:6px;font-size:13px;color:var(--text);
  cursor:pointer;transition:background .15s;user-select:none;
}
.doc-item:hover{background:var(--hover)}
.doc-item.sel{background:rgba(201,100,66,.1)}
.doc-check{font-size:12px;color:transparent;min-width:12px;font-weight:600}
.doc-item.sel .doc-check{color:var(--accent)}
.doc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.dot.proc{background:#f59e0b;animation:pulse 1s ease-in-out infinite}

/* Health */
.health-bar{
  display:flex;align-items:center;gap:7px;font-size:11px;
  color:var(--muted);padding:5px 8px;background:#111;
  border-radius:7px;margin:2px;
}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hdot.g{background:#22c55e}
.hdot.y{background:#f59e0b;animation:pulse 1s ease-in-out infinite}
.hdot.r{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Hist */
.hist-item{
  padding:6px 8px;border-radius:6px;font-size:12px;
  color:var(--muted);cursor:pointer;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
  transition:background .15s,color .15s;
}
.hist-item:hover{background:var(--hover);color:var(--text)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:1px solid var(--border);min-height:46px;
}
/* .topbar-title{font-size:13px;color:var(--muted);font-weight:500} */
.topbar-title{font-size:15px;color:var(--text);font-weight:400;font-family:var(--font-display)}
.mode-badge{
  font-size:11px;padding:3px 8px;border-radius:20px;
  font-weight:500;letter-spacing:.3px;
}
.mode-badge.doc{background:rgba(201,100,66,.15);color:var(--accent)}
.mode-badge.normal{background:rgba(142,142,160,.1);color:var(--muted)}

/* CHAT SCROLL */
.chat-scroll{flex:1;overflow-y:auto;padding:20px 0 130px;scroll-behavior:smooth}
.chat-scroll::-webkit-scrollbar{width:5px}
.chat-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.chat-inner{max-width:720px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:20px}

/* WELCOME */
.welcome{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:55vh;text-align:center;gap:12px;
}
.welcome-eye{color:var(--accent);margin-bottom:4px}
.welcome h2{font-size:32px;font-weight:400;color:var(--text);letter-spacing:-.5px;font-family:var(--font-display)}
.welcome p{font-size:14px;color:var(--muted);max-width:380px;line-height:1.6}
.welcome-hint{font-size:12px;color:var(--accent);margin-top:2px}

/* MESSAGES */
.msg{display:flex;gap:10px;width:100%;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.msg.user{justify-content:flex-end}
.msg.user .bubble{
  background:var(--bubble);padding:9px 13px;
  border-radius:16px 16px 3px 16px;max-width:70%;
  font-size:14px;line-height:1.65;color:var(--text);
}

.msg.assistant{justify-content:flex-start;align-items:flex-start}
.msg-icon{min-width:26px;padding-top:3px;flex-shrink:0;color:var(--accent)}

/* SVG Eye in message - blinks when loading */
.eye-blink-wrap{display:inline-block}
@keyframes eyeblink{
  0%,85%,100%{transform:scaleY(1)}
  92%{transform:scaleY(.08)}
}
.eye-blink-wrap.blinking svg .eyelid{
  animation:eyeblink 2s ease-in-out infinite;
  transform-origin:center 50%;
}

.msg-body{font-size:14px;line-height:1.75;color:var(--text);max-width:86%}
.msg-body p{margin-bottom:8px}
.msg-body p:last-child{margin-bottom:0}
.msg-body ul,.msg-body ol{padding-left:18px;margin-bottom:8px}
.msg-body li{margin-bottom:3px}
.msg-body strong{color:#fff;font-weight:600}
.msg-body em{color:var(--muted)}
.msg-body h1,.msg-body h2,.msg-body h3{color:#fff;margin:10px 0 5px;font-weight:600}
.msg-body code{
  background:#111;padding:2px 5px;border-radius:4px;
  font-family:var(--mono);font-size:12px;color:#e2b96f;
}
.msg-body pre{
  background:#0d0d0d;border:1px solid var(--border);
  border-radius:7px;padding:12px;overflow-x:auto;margin:8px 0;
}
.msg-body pre code{background:none;padding:0;color:var(--text);font-size:12px}

/* Citations */
.cites-wrap{margin-top:10px}
.cites-btn{
  background:none;border:none;color:var(--muted);font-size:11px;
  cursor:pointer;font-family:var(--font);padding:2px 0;
  display:flex;align-items:center;gap:4px;transition:color .15s;
}
.cites-btn:hover{color:var(--text)}
.cites-list{margin-top:7px;display:flex;flex-direction:column;gap:5px;display:none}
.cite-card{
  background:var(--bubble);border:1px solid var(--border);
  border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text);
}
.cite-n{color:var(--accent);font-weight:600}
.cite-f{font-size:11px;color:var(--muted);margin-top:2px}
.cite-p{font-size:11px;color:var(--muted);margin-top:3px;font-style:italic}

/* INPUT */
.input-wrap{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,var(--bg) 72%,transparent);
  padding:10px 20px 18px;display:flex;justify-content:center;
}
.input-box{
  width:100%;max-width:720px;background:var(--input);
  border:1px solid var(--border);border-radius:13px;
  padding:10px 12px;box-shadow:0 4px 18px rgba(0,0,0,.3);
  display:flex;align-items:flex-end;gap:8px;
  transition:border-color .2s;
}
.input-box:focus-within{border-color:#4a4a4a}
#chat-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:14px;font-family:var(--font);
  line-height:1.5;resize:none;max-height:150px;overflow-y:auto;padding:0;
}
#chat-input::placeholder{color:var(--muted)}
.send-btn{
  background:var(--accent);border:none;border-radius:7px;
  width:32px;height:32px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:#fff;flex-shrink:0;
  transition:opacity .15s,transform .1s;
}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

/* Mobile */
.mob-btn{display:none;position:fixed;top:10px;left:10px;z-index:200}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}

@media(max-width:680px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.show{display:block}
  .mob-btn{display:flex}
  .topbar{padding-left:46px}
  .chat-inner{padding:0 12px}
  .input-wrap{padding:8px 12px 14px}
  .msg.user .bubble{max-width:86%}
  .msg-body{max-width:96%}
}

/* AUTH GATE */
#auth-gate{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;align-items:center;justify-content:center;
}
.auth-box{
  width:100%;max-width:340px;padding:28px;background:var(--sidebar);
  border:1px solid var(--border);border-radius:14px;
}
.auth-title{
  font-family:var(--font-display);font-size:24px;font-weight:400;
  color:var(--text);text-align:center;margin-bottom:4px;
}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.auth-box input{
  display:block;width:100%;margin:8px 0;padding:10px 12px;
  background:var(--input);border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-family:var(--font);font-size:14px;outline:none;
  box-sizing:border-box;
}
.auth-box input:focus{border-color:var(--accent)}
.auth-box input::placeholder{color:var(--muted)}
.auth-btn{
  width:100%;padding:10px;margin-top:10px;background:var(--accent);
  border:none;border-radius:8px;color:#fff;font-family:var(--font);
  font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;
}
.auth-btn:hover{opacity:.88}
.auth-toggle{
  text-align:center;margin-top:16px;color:var(--muted);font-size:13px;cursor:pointer;
}
.auth-toggle:hover{color:var(--text)}
#auth-msg{font-size:12px;text-align:center;margin-top:10px;min-height:16px;color:#ef4444}
#auth-msg.success{color:#22c55e}
#name-field{display:none}
</style>
</head>
<body>

<div class="overlay" id="ov" onclick="closeSb()"></div>
<button class="mob-btn icon-btn" onclick="openSb()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  </svg>
</button>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-box">
    <div class="auth-title" id="auth-title">Welcome back</div>
    <div class="auth-sub" id="auth-sub">Login to Athena AI</div>

    <input type="text" id="auth-name" placeholder="Full name" style="display:none">
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-password" placeholder="Password">
    <div style="font-size:11px;color:var(--muted);margin:-4px 0 8px 2px">Password must be at least 8 characters</div>

    <button class="auth-btn" id="auth-submit" onclick="submitAuth()">Login</button>
    <div class="auth-toggle" id="auth-toggle" onclick="toggleAuthMode()">Don't have an account? Sign up</div>
    <div id="auth-msg"></div>
  </div>
</div>

<div class="app" id="app-root" style="display:none">

<!-- SIDEBAR -->
<aside class="sidebar" id="sb">
  <div class="sb-top">
    <div class="sb-logo">
      <!-- Cute SVG Eye - static in sidebar -->
      <svg class="eye-svg" viewBox="0 0 36 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 12 C8 2, 28 2, 34 12 C28 22, 8 22, 2 12Z" stroke="currentColor" stroke-width="2" fill="none"/>
        <circle cx="18" cy="12" r="5" fill="currentColor"/>
        <circle cx="20" cy="10" r="1.5" fill="white" opacity=".6"/>
      </svg>
      Athena AI
    </div>
    <div style="display:flex;gap:2px">
      <button class="icon-btn" onclick="newChat()" title="New chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="logout()" title="Logout">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-normal" onclick="setMode('normal')">
      <span style="display:inline-flex;align-items:center;gap:5px;justify-content:center">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        Normal
      </span>
    </button>
    <button class="mode-btn" id="btn-doc" onclick="setMode('doc')">
      <span style="display:inline-flex;align-items:center;gap:5px;justify-content:center">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="16" y2="17"/>
        </svg>
        Doc Intelligence
      </span>
    </button>
  </div>

  <!-- Health -->
  <div class="health-bar">
    <span class="hdot y" id="hdot"></span>
    <span id="htxt">Connecting...</span>
  </div>

  <!-- Doc mode stuff -->
  <div id="doc-panel" style="display:none">
    <div class="sec-label">Upload Documents</div>
    <label class="upload-area">
      <input type="file" id="file-in" accept=".pdf,.docx,.pptx,.xlsx,.csv,.txt,.png,.jpg" onchange="handleUpload(this)">
      <div class="upload-icon">📄</div>
      <div class="upload-text">Click to upload</div>
      <div class="upload-hint">PDF · DOCX · PPTX · XLSX · CSV · TXT</div>
    </label>
    <div id="docs-sec" style="display:none">
      <div class="divider"></div>
      <div class="sec-label">Documents</div>
      <div id="doc-list"></div>
    </div>
  </div>

  <!-- Chat history -->
  <div id="hist-sec" style="display:none">
    <div class="divider"></div>
    <div class="sec-label">Recent</div>
    <div id="hist-list"></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="icon-btn" id="sb-toggle" onclick="toggleSb()" title="Toggle sidebar" style="color:var(--text)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
    </button>
    <span class="topbar-title">Athena AI</span>
  </div>
  <span class="mode-badge normal" id="mode-badge">Normal Mode</span>
</div>

  <div class="chat-scroll" id="cs">
    <div class="chat-inner" id="ci">
      <div class="welcome" id="welcome">
        <div style="display:flex;align-items:center;gap:12px;justify-content:center">
          <svg width="40" height="27" viewBox="0 0 48 32" fill="none">
            <path d="M2 16 C12 2, 36 2, 46 16 C36 30, 12 30, 2 16Z" stroke="#c96442" stroke-width="2.5" fill="none"/>
            <circle cx="24" cy="16" r="7" fill="#c96442"/>
            <circle cx="27" cy="13" r="2.5" fill="white" opacity=".55"/>
          </svg>
          <h2 style="font-size:32px;font-weight:400;color:var(--text);font-family:var(--font-display)">How can I help you?</h2>
        </div>
        <p id="welcome-sub">Ask me anything — I'm in Normal Mode. Switch to Doc Intelligence mode to query your documents.</p>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-box">
      <textarea id="chat-input" rows="1"
        placeholder="Message Athena..."
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="send-btn" id="sbtn" onclick="send()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

</div>

<script>
const API = "https://athena-api.calmcoast-2711a075.centralindia.azurecontainerapps.io";
let mode = 'normal'; // 'normal' | 'doc'
let docs = [], selIds = [], msgs = [], history = [];
let busy = false;
let sessId;

function uid() {return crypto.randomUUID()}
sessId = uid();

// SVG eye markup for messages
function eyeSvg(blink=false){
  return `<div class="eye-blink-wrap${blink?' blinking':''}">
    <svg width="26" height="18" viewBox="0 0 36 24" fill="none">
      <path class="eyelid" d="M2 12 C8 2, 28 2, 34 12 C28 22, 8 22, 2 12Z"
        stroke="#c96442" stroke-width="2" fill="none"/>
      <circle cx="18" cy="12" r="5" fill="#c96442"/>
      <circle cx="20" cy="10" r="1.5" fill="white" opacity=".6"/>
    </svg>
  </div>`;
}

// Blink animation via JS (scaleY on path won't work well, do it on whole svg)
const blinkStyle = document.createElement('style');
blinkStyle.textContent = `
@keyframes svgblink{0%,85%,100%{transform:scaleY(1)}92%{transform:scaleY(.1)}}
.eye-blink-wrap.blinking svg{animation:svgblink 2s ease-in-out infinite;transform-origin:center center}
`;
document.head.appendChild(blinkStyle);

// ===== AUTH =====
let isSignupMode = false;

function getToken(){ return localStorage.getItem('access_token'); }
function authHeaders(){
  const t = getToken();
  return t ? {'Authorization': 'Bearer ' + t} : {};
}

function showApp(){
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-root').style.display = '';
  checkHealth();
  setInterval(checkHealth,15000);
  updateSend();
  loadUserData();
}

async function loadUserData(){
  try{
    const r = await fetch(`${API}/me/documents`, {headers: authHeaders()});
    if(r.ok){
      const data = await r.json();
      docs = data.map(d => ({document_id: d.document_id, filename: d.filename, status: d.status, total_chunks: d.total_chunks}));
      renderDocs();
    }
  }catch(e){ console.error('Could not load documents', e); }

  try{
    const r = await fetch(`${API}/query/history/sessions`, {headers: authHeaders()});
    if(r.ok){
      const data = await r.json();
      history = data.map(s => ({name: s.title || 'Chat', sessId: s.session_id, msgs: null, mode: 'doc'}));
      renderHist();
    }
  }catch(e){ console.error('Could not load chat history', e); }
}
function showGate(){
  document.getElementById('auth-gate').style.display = 'flex';
  document.getElementById('app-root').style.display = 'none';
}

function toggleAuthMode(){
  isSignupMode = !isSignupMode;
  document.getElementById('auth-title').textContent = isSignupMode ? 'Create account' : 'Welcome back';
  document.getElementById('auth-sub').textContent = isSignupMode ? 'Sign up for Athena AI' : 'Login to Athena AI';
  document.getElementById('auth-submit').textContent = isSignupMode ? 'Sign Up' : 'Login';
  document.getElementById('auth-toggle').textContent = isSignupMode
    ? 'Already have an account? Login'
    : "Don't have an account? Sign up";
  document.getElementById('auth-name').style.display = isSignupMode ? 'block' : 'none';
  document.getElementById('auth-msg').textContent = '';
}

async function submitAuth(){
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const fullName = document.getElementById('auth-name').value.trim();
  const msg = document.getElementById('auth-msg');
  msg.className = ''; msg.textContent = '';

  if(!email || !password){ msg.textContent = 'Email and password are required.'; return; }
  if(isSignupMode && password.length < 8){
    msg.textContent = 'Password must be at least 8 characters.';
    return;
  }

  try{
    if(isSignupMode){
      const r = await fetch(`${API}/auth/signup`,{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, password, full_name: fullName || null})
      });
      const d = await r.json();
      if(!r.ok) throw new Error(parseApiError(d));
      msg.className = 'success'; msg.textContent = 'Account created! Logging you in...';
      await doLogin(email, password);
    } else {
      await doLogin(email, password);
    }
  }catch(e){
    msg.textContent = e.message;
  }
}

// Converts FastAPI error responses (plain string OR validation array) into a readable message
function parseApiError(d){
  if(!d || !d.detail) return 'Something went wrong. Please try again.';
  if(typeof d.detail === 'string') return d.detail;
  if(Array.isArray(d.detail)){
    return d.detail.map(err => {
      const field = Array.isArray(err.loc) ? err.loc[err.loc.length-1] : 'Field';
      return `${field}: ${err.msg}`;
    }).join(' | ');
  }
  return 'Something went wrong. Please try again.';
}

async function doLogin(email, password){
  const r = await fetch(`${API}/auth/login`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const d = await r.json();
  if(!r.ok) throw new Error(parseApiError(d));
  localStorage.setItem('access_token', d.access_token);
  showApp();
}

function logout(){
  localStorage.removeItem('access_token');
  showGate();
}

async function checkAuthOnLoad(){
  const token = getToken();
  if(!token){ showGate(); return; }
  try{
    const r = await fetch(`${API}/auth/me`,{headers: authHeaders()});
    if(!r.ok) throw new Error('invalid');
    showApp();
  }catch{
    localStorage.removeItem('access_token');
    showGate();
  }
}

document.getElementById('name-field') || (() => {
  document.getElementById('auth-name').id = 'auth-name'; // no-op safeguard
})();

// Init
checkAuthOnLoad();

// Mode
function setMode(m){
  mode = m;
  document.getElementById('btn-normal').classList.toggle('active', m==='normal');
  document.getElementById('btn-doc').classList.toggle('active', m==='doc');
  document.getElementById('doc-panel').style.display = m==='doc' ? 'block' : 'none';
  const badge = document.getElementById('mode-badge');
  badge.textContent = m==='doc' ? 'Doc Intelligence' : 'Normal';
  badge.className = 'mode-badge ' + (m==='doc' ? 'doc' : 'normal');
  const sub = document.getElementById('welcome-sub');
  if(sub) sub.textContent = m==='doc'
    ? 'Upload documents from the sidebar, select them, then ask questions.'
    : 'Ask me anything — switch to Doc Intelligence to query your documents.';
  updateSend();
}

// Health
async function checkHealth(){
  try{
    const r = await fetch(`${API}/health/detailed`,{signal:AbortSignal.timeout(5000)});
    const d = await r.json();
    const ok = d.app==='healthy';
    document.getElementById('hdot').className='hdot '+(ok?'g':'r');
    document.getElementById('htxt').textContent = ok
      ? `Backend healthy · ${d.text_collection_count??0} vectors`
      : 'Backend unhealthy';
  }catch{
    document.getElementById('hdot').className='hdot r';
    document.getElementById('htxt').textContent='Backend unreachable';
  }
}

// Upload
async function handleUpload(inp){
  const file=inp.files[0]; if(!file)return; inp.value='';
  try{
    const fd=new FormData(); fd.append('file',file);
    const r=await fetch(`${API}/upload`,{method:'POST',headers:authHeaders(),body:fd});
    if(!r.ok)throw new Error('Upload failed');
    const d=await r.json();
    const doc={document_id:d.document_id,filename:file.name,status:'processing',total_chunks:null};
    docs.push(doc); renderDocs(); pollStatus(doc);
  }catch(e){alert('Upload failed: '+e.message)}
}

async function pollStatus(doc){
  for(let i=0;i<60;i++){
    await sleep(3000);
    try{
      const r=await fetch(`${API}/status/${doc.document_id}`,{headers:authHeaders()});
      const d=await r.json();
      doc.status=d.status; doc.total_chunks=d.total_chunks;
      renderDocs();
      if(d.status==='completed'||d.status==='failed')break;
    }catch{break}
  }
}

function renderDocs(){
  const sec=document.getElementById('docs-sec');
  const list=document.getElementById('doc-list');
  if(!docs.length){sec.style.display='none';return}
  sec.style.display='block';
  list.innerHTML=docs.map(d=>{
    const sel=selIds.includes(d.document_id);
    const done=d.status==='completed';
    return`<div class="doc-item${sel?' sel':''}" onclick="toggleDoc('${d.document_id}')">
      <span class="doc-check">${sel?'✓':''}</span>
      <span class="doc-name" title="${esc(d.filename)}">${esc(d.filename)}</span>
      <span class="dot${done?'':' proc'}"></span>
    </div>`;
  }).join('');
  updateSend();
}

function toggleDoc(id){
  const i=selIds.indexOf(id);
  i===-1?selIds.push(id):selIds.splice(i,1);
  renderDocs(); updateSend();
}

// Send
function updateSend(){
  const inp=document.getElementById('chat-input');
  const btn=document.getElementById('sbtn');
  if(mode==='doc'){
    inp.placeholder=selIds.length
      ?`Ask about ${selIds.length} selected doc(s)...`
      :'Select documents from the sidebar first...';
    btn.disabled=!selIds.length||busy;
  } else {
    inp.placeholder='Message Athena...';
    btn.disabled=busy;
  }
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(!document.getElementById('sbtn').disabled)send();
  }
}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,150)+'px'}

async function send(){
  const inp=document.getElementById('chat-input');
  const q=inp.value.trim(); if(!q||busy)return;
  if(mode==='doc'&&!selIds.length)return;
  inp.value=''; inp.style.height='auto';
  busy=true; updateSend();
  hideWelcome();
  addUserMsg(q);
  const tid='t'+Date.now(); addThinking(tid);
  try{
    let d;
    if(mode==='doc'){
      const r=await fetch(`${API}/query`,{
        method:'POST',
        headers:{'Content-Type':'application/json',...authHeaders()},
        body:JSON.stringify({query:q,document_ids:selIds,session_id:sessId,top_k:8,include_evidence:true})
      });
      if(!r.ok)throw new Error('Query failed');
      d=await r.json();
    } else {
      // Normal mode — query without doc filter
      const r=await fetch(`${API}/query/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/json',...authHeaders()},
        body:JSON.stringify({query:q,document_ids:null,session_id:sessId,top_k:8,include_evidence:false})
      });
      if(!r.ok)throw new Error('Query failed');
      d=await r.json();
    }
    rmThinking(tid);
    await stream(d.answer, mode==='doc'?(d.citations||[]):[]);
    msgs.push({role:'assistant',content:d.answer,citations:d.citations||[]});
  }catch(e){
    rmThinking(tid);
    addAssistantMsg('⚠️ Error: '+e.message,[]);
  }finally{busy=false;updateSend()}
}

// DOM helpers
function hideWelcome(){const w=document.getElementById('welcome');if(w)w.remove()}

function addUserMsg(txt){
  msgs.push({role:'user',content:txt});
  const d=document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="bubble">${esc(txt).replace(/\n/g,'<br>')}</div>`;
  document.getElementById('ci').appendChild(d);
  scrollBot();
}

function addThinking(id){
  const d=document.createElement('div');
  d.className='msg assistant'; d.id=id;
  d.innerHTML=`<div class="msg-icon">${eyeSvg(true)}</div>
    <div class="msg-body" style="color:var(--muted);font-size:13px">Thinking…</div>`;
  document.getElementById('ci').appendChild(d);
  scrollBot();
}
function rmThinking(id){const e=document.getElementById(id);if(e)e.remove()}

async function stream(text,cites){
  const d=document.createElement('div');
  d.className='msg assistant';
  const icon=document.createElement('div'); icon.className='msg-icon';
  icon.innerHTML=eyeSvg(true);
  const body=document.createElement('div'); body.className='msg-body';
  d.appendChild(icon); d.appendChild(body);
  document.getElementById('ci').appendChild(d);
  const words=text.split(' '); let out='';
  for(const w of words){
    out+=w+' '; body.innerHTML=md(out.trim()); scrollBot(); await sleep(25);
  }
  icon.innerHTML=eyeSvg(false);
  body.innerHTML=md(text)+citeHtml(cites);
  scrollBot();
}

function addAssistantMsg(text,cites){
  const d=document.createElement('div');
  d.className='msg assistant';
  d.innerHTML=`<div class="msg-icon">${eyeSvg(false)}</div>
    <div class="msg-body">${md(text)}${citeHtml(cites)}</div>`;
  document.getElementById('ci').appendChild(d);
  scrollBot();
}

function citeHtml(cites){
  if(!cites||!cites.length)return'';
  const items=cites.slice(0,5).map((c,i)=>`
    <div class="cite-card">
      <span class="cite-n">[${i+1}]</span>
      <div class="cite-f">${esc(c.source_filename||'Unknown')} · Page ${c.page_number??'N/A'}</div>
      ${c.content_preview?`<div class="cite-p">${esc(c.content_preview.slice(0,110))}…</div>`:''}
    </div>`).join('');
  return`<div class="cites-wrap">
    <button class="cites-btn" onclick="togCites(this)">📎 ${cites.length} source(s) ›</button>
    <div class="cites-list">${items}</div>
  </div>`;
}
function togCites(btn){
  const l=btn.nextElementSibling;
  const open=l.style.display==='flex';
  l.style.display=open?'none':'flex';
  btn.textContent=(open?'📎 ':'📎 ')+(open?`${btn.textContent.match(/\d+/)?.[0]} source(s) ›`:`${btn.textContent.match(/\d+/)?.[0]} source(s) ↓`);
}

// New chat
function newChat(){
  if(msgs.length){
    const name=msgs[0]?.content?.slice(0,38)||'Chat';
    const existingIdx = history.findIndex(h => h.sessId === sessId);
    if(existingIdx !== -1){
      history[existingIdx].name = name;
      history[existingIdx].msgs = [...msgs];
    } else {
      history.unshift({name,msgs:[...msgs],sessId,mode});
    }
    renderHist();
  }
  msgs=[]; sessId=uid(); busy=false; updateSend();
  document.getElementById('ci').innerHTML=`
    <div class="welcome" id="welcome">
      <div style="display:flex;align-items:center;gap:12px;justify-content:center">
        <svg width="40" height="27" viewBox="0 0 48 32" fill="none">
          <path d="M2 16 C12 2, 36 2, 46 16 C36 30, 12 30, 2 16Z" stroke="#c96442" stroke-width="2.5" fill="none"/>
          <circle cx="24" cy="16" r="7" fill="#c96442"/>
          <circle cx="27" cy="13" r="2.5" fill="white" opacity=".55"/>
        </svg>
        <h2 style="font-size:32px;font-weight:400;color:var(--text);font-family:var(--font-display)">How can I help you?</h2>
      </div>
      <p id="welcome-sub">${mode==='doc'
        ?'Upload documents from the sidebar, select them, then ask questions.'
        :'Ask me anything — switch to Doc Intelligence to query your documents.'}</p>
    </div>`;
  closeSb();
}


function renderHist(filter=''){
  const sec=document.getElementById('hist-sec');
  const list=document.getElementById('hist-list');
  if(!history.length){sec.style.display='none';return}
  sec.style.display='block';
  const filtered=history.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()));
  const searchBox=`<div style="padding:4px 2px 6px;position:relative">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none">
      <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search chats..." 
      oninput="renderHist(this.value)"
      style="width:100%;background:#111;border:1px solid var(--border);border-radius:6px;
      padding:6px 8px 6px 30px;color:var(--text);font-size:12px;font-family:var(--font);outline:none"
      value="${esc(filter)}">
  </div>`;
  list.innerHTML=searchBox+filtered.slice(0,20).map((c,i)=>
    `<div class="hist-item-wrap" style="display:flex;align-items:center;gap:4px;border-radius:6px;padding:2px 4px;transition:background .15s" onmouseenter="this.style.background='var(--hover)'" onmouseleave="this.style.background='transparent'">
      <div class="hist-item" style="flex:1;padding:5px 4px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)" onclick="loadChat(${history.indexOf(c)})">${esc(c.name)}</div>
      <button onclick="renameChat(${history.indexOf(c)})" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:3px;border-radius:4px;flex-shrink:0;display:flex;align-items:center" title="Rename">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4Z"/>
        </svg>
      </button>
      <button onclick="deleteChat(${history.indexOf(c)})" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:3px;border-radius:4px;flex-shrink:0;display:flex;align-items:center" title="Delete">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </button>
    </div>`).join('');
}

function renameChat(i){
  const newName = prompt('Rename chat:', history[i].name);
  if(newName && newName.trim()){
    history[i].name = newName.trim();
    renderHist();
  }
}

function deleteChat(i){
  if(confirm('Delete this chat?')){
    history.splice(i, 1);
    renderHist();
  }
}

async function loadChat(i){
  const c=history[i]; if(!c)return;

  if(c.msgs === null || c.msgs === undefined){
    try{
      const r = await fetch(`${API}/query/history/${c.sessId}`, {headers: authHeaders()});
      if(!r.ok) throw new Error('Failed to load chat');
      const data = await r.json();
      c.msgs = data.map(m => ({role:m.role, content:m.content, citations:m.citations||[]}));
    }catch(e){
      alert('Could not load this chat: ' + e.message);
      return;
    }
  }

  msgs=[...c.msgs]; sessId=c.sessId;
  const ci=document.getElementById('ci'); ci.innerHTML='';
  msgs.forEach(m=>{
    const d=document.createElement('div');
    d.className='msg '+m.role;
    if(m.role==='user')d.innerHTML=`<div class="bubble">${esc(m.content).replace(/\n/g,'<br>')}</div>`;
    else d.innerHTML=`<div class="msg-icon">${eyeSvg(false)}</div>
      <div class="msg-body">${md(m.content)}${citeHtml(m.citations||[])}</div>`;
    ci.appendChild(d);
  });
  scrollBot(); closeSb();
}

// Mobile
function toggleSb(){
  const sb=document.getElementById('sb');
  const isOpen=!sb.classList.contains('sb-hidden');
  if(isOpen){
    sb.classList.add('sb-hidden');
    sb.style.transform='translateX(-100%)';
    sb.style.width='0';
    sb.style.minWidth='0';

    sb.style.overflow='hidden';
  } else {
    sb.classList.remove('sb-hidden');
    sb.style.transform='';
    sb.style.width='256px';
    sb.style.minWidth='256px';
    sb.style.padding='10px 8px';

  }
}
function openSb(){document.getElementById('sb').classList.add('open');document.getElementById('ov').classList.add('show')}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show')}

// Utils
function scrollBot(){const s=document.getElementById('cs');s.scrollTop=s.scrollHeight}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
// function uid(){return crypto.randomUUID()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md(t){
  return('<p>'+t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\s\S]*?```/g,m=>'</p><pre><code>'+m.slice(3,m.lastIndexOf('```')).replace(/^[a-z]+\n/,'')+'</code></pre><p>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'</p><h3>$1</h3><p>')
    .replace(/^## (.+)$/gm,'</p><h2>$1</h2><p>')
    .replace(/^# (.+)$/gm,'</p><h1>$1</h1><p>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'</p><ul>$1</ul><p>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>')
    +'</p>').replace(/<p><\/p>/g,'');
}
