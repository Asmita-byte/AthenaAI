name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff black

      - name: Run Ruff linter
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 ghostscript

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create test env file
        run: |
          echo "GROQ_API_KEY=test_key" >> .env
          echo "GEMINI_API_KEY=test_key" >> .env
          echo "ENVIRONMENT=development" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "QDRANT_USE_MEMORY=true" >> .env

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t athena-api:test .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t athena-worker:test .